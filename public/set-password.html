<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set your password — eReport</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-900 text-white p-4">
  <div class="w-full max-w-md bg-slate-800 rounded-xl p-8 shadow-xl border border-slate-700">
    <h1 class="text-xl font-semibold mb-2">Set your new password</h1>
    <p class="text-sm text-slate-400 mb-6">
      You are using a default password. Choose a new one to continue. Passwords are stored by Supabase; they are not shown to admins in this app.
    </p>
    <p id="err" class="hidden text-sm text-red-400 mb-3"></p>
    <label class="text-sm text-slate-300 block mb-1" for="displayName">Display name (optional)</label>
    <input id="displayName" class="w-full mb-4 px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-white" />
    <label class="text-sm text-slate-300 block mb-1" for="pw1">New password</label>
    <input id="pw1" type="password" minlength="6" class="w-full mb-4 px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-white" />
    <label class="text-sm text-slate-300 block mb-1" for="pw2">Confirm password</label>
    <input id="pw2" type="password" minlength="6" class="w-full mb-6 px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-white" />
    <button id="saveBtn" type="button" class="w-full py-2.5 rounded-lg bg-teal-500 text-slate-900 font-semibold hover:bg-teal-400 disabled:opacity-50">
      Save and continue
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/ereport-config.js"></script>
  <script>
    (async function () {
      const errEl = document.getElementById("err");
      const btn = document.getElementById("saveBtn");

      if (!window.ereportSupabaseConfigured || !window.ereportSupabaseConfigured()) {
        errEl.textContent = "Configure /js/ereport-config.js first.";
        errEl.classList.remove("hidden");
        btn.disabled = true;
        return;
      }

      const sb = window.getSupabaseClient();

      const {
        data: { session },
      } = await sb.auth.getSession();
      if (!session) {
        window.location.href = "/login.html";
        return;
      }

      const { data: profile } = await sb
        .from("profiles")
        .select("role, must_change_password, full_name")
        .eq("employee_id", session.user.id)
        .maybeSingle();

      if (!profile?.must_change_password) {
        window.location.href =
          profile?.role === "admin" ? "/admin-dashboard.html" : "/employee-dashboard.html";
        return;
      }

      document.getElementById("displayName").value = profile.full_name || "";

      btn.addEventListener("click", async function () {
        errEl.classList.add("hidden");
        const pw1 = document.getElementById("pw1").value;
        const pw2 = document.getElementById("pw2").value;
        const displayName = document.getElementById("displayName").value.trim();

        if (pw1.length < 6) {
          errEl.textContent = "Password must be at least 6 characters.";
          errEl.classList.remove("hidden");
          return;
        }
        if (pw1 !== pw2) {
          errEl.textContent = "Passwords do not match.";
          errEl.classList.remove("hidden");
          return;
        }

        btn.disabled = true;
        const { error: uErr } = await sb.auth.updateUser({ password: pw1 });
        if (uErr) {
          errEl.textContent = uErr.message;
          errEl.classList.remove("hidden");
          btn.disabled = false;
          return;
        }

        const { error: upErr } = await sb
          .from("profiles")
          .update({
            must_change_password: false,
            password_changed_at: new Date().toISOString(),
            ...(displayName ? { full_name: displayName } : {}),
          })
          .eq("employee_id", session.user.id);

        if (upErr) {
          errEl.textContent = upErr.message;
          errEl.classList.remove("hidden");
          btn.disabled = false;
          return;
        }

        window.location.href =
          profile.role === "admin" ? "/admin-dashboard.html" : "/employee-dashboard.html";
      });
    })();
  </script>
</body>
</html>
