<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eReport Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center 
bg-white">

  <!-- LOGIN CARD -->
  <div class="bg-gray-300 w-[500px] max-w-full rounded-2xl shadow-2xl p-10">

    <!-- LOGO -->
    <h1 class="text-4xl font-extrabold text-center mb-8 
    bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 
    bg-clip-text text-transparent">
      eReport
    </h1>

    <!-- FORM -->
    <form>
      <!-- EMAIL -->
      <label class="text-sm text-gray-600">Email</label>
      <input 
        type="email" 
        placeholder="Value"
        class="w-full mt-1 mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
      />

      <!-- PASSWORD -->
      <label class="text-sm text-gray-600">Password</label>
      <input 
        type="password" 
        placeholder="Value"
        class="w-full mt-1 mb-2 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400"
      />

      <!-- FORGOT -->
      <a href="#" class="text-sm text-gray-500 hover:underline">
        Forgot password?
      </a>

      <!-- BUTTON -->
      <button 
        type="submit"
        class="w-full mt-6 bg-[#0B0F2F] text-white py-2 rounded-lg 
        hover:opacity-90 transition shadow-md">
        Sign In
      </button>

      <!-- BACK LINK -->
      <button
        type="button"
        onclick="window.location.href='/'"
        class="w-full mt-3 text-sm text-purple-600 hover:text-purple-800 underline"
      >
        ← Back to Landing Page
      </button>
    </form>

  </div>

</body>
</html>
